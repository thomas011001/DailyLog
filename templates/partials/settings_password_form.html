{% load widget_tweaks %}

<form id="settings-password-form"
      hx-post="{% url 'account:change-password' %}"
      hx-target="#settings-password-form"
      hx-swap="outerHTML">
    {% csrf_token %}
    
    {% if password_form.non_field_errors %}
        <div role="alert" class="alert alert-error mb-4">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 shrink-0 stroke-current" fill="none" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 14l2-2m0 0l2-2m-2 2l-2-2m2 2l2 2m7-2a9 9 0 11-18 0 9 9 0 0118 0z" /></svg>
            <span>{{ password_form.non_field_errors }}</span>
        </div>
    {% endif %}

    <fieldset class="fieldset w-full">
        {% for field in password_form %}
            <fieldset class="fieldset">
                <legend class="fieldset-legend">{{ field.label }}</legend>
                {{ field|add_class:"input validator w-full" }}
            </fieldset>
            {% if field.errors %}
                <div role="alert" class="alert alert-error mt-2">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 shrink-0 stroke-current" fill="none" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 14l2-2m0 0l2-2m-2 2l-2-2m2 2l2 2m7-2a9 9 0 11-18 0 9 9 0 0118 0z" /></svg>
                    <span>{{ field.errors }}</span>
                </div>
            {% endif %}
        {% endfor %}
        <button type="submit" class="btn btn-warning mt-4 w-full">Change Password</button>
    </fieldset>
</form>
