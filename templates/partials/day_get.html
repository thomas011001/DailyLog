<div id="day-content" class="p-10 flex flex-col gap-8">
    {# Header Section #}
    <div class="flex flex-col w-full gap-5"
         hx-get="{% url "core:day-header" dayid %}"
         hx-trigger="load, refreshDayHeader from:body"
         hx-swap="innerHTML"
         hx-target="this">
        {# skeleton #}
        <div class="skeleton max-w-100 w-full h-12"></div>
        <div class="flex justify-between items-center">
            <div class="skeleton max-w-50 w-full h-6"></div>
            <div class="skeleton h-6 w-6 rounded-full"></div>
        </div>
    </div>
    {# Task Section #}
    <div class="border border-base-300 rounded-xl shadow shadow-base-300 p-6 flex flex-col gap-5"
         x-data="{showInput: false}">
        <div class="flex flex-col gap-2">
            <div class="flex justify-between">
                <h1 class="text-xl font-bold text-start">Day Tasks</h1>
                {% comment %} <div class="badge badge-primary badge-outline rounded hover:badge-soft transition">counter: {{ day.tasks|length }}</div> {% endcomment %}
            </div>
            <div class="divider before:h-px after:h-px my-0 "></div>
        </div>
        <div id="task-list"
             class="flex flex-col gap-5"
             hx-get="{% url "core:task-list" dayid %}"
             hx-trigger="load, refreshTaskList from:body"
             hx-swap="innerHTML"
             hx-target="this">
            {# skeleton #}
            <div class="flex gap-3">
                <div class="skeleton h-8 w-8"></div>
                <div class="skeleton h-8 max-w-100 w-full"></div>
            </div>
            <div class="flex gap-3">
                <div class="skeleton h-8 w-8"></div>
                <div class="skeleton h-8 max-w-80 w-full"></div>
            </div>
            <div class="flex gap-3">
                <div class="skeleton h-8 w-8"></div>
                <div class="skeleton h-8 max-w-50 w-full"></div>
            </div>
        </div>
        <form  x-show="showInput"
               hx-post="{% url 'core:task-create' dayid %}"
               hx-trigger="submit"
               hx-swap="beforeend"
               hx-target="#task-list"
               hx-headers='{"X-CSRFToken": "{{ csrf_token }}"}'
               @htmx:after-request="$el.reset(); showInput = false"
               >
            <label class="input validator w-full">
                <input type="text" class="grow" placeholder="Task Title" name="title" required minlength="2">
                <button type="button" @click="showInput = false; $el.closest('form').reset()" class="btn btn-ghost btn-sm btn-circle" >
                    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="size-6">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M6 18 18 6M6 6l12 12" />
                    </svg>
                </button>
            </label>
        </form>
        <button x-show="!showInput" @click="showInput = true" class="btn btn-dash border-base-content/50 text-base-content/50 hover:text-primary hvoer:border-primary">
            + ADD TASK
        </button>
    </div>
    {# Step Section #}
    <div class="rounded-xl bg-base-200 border border-base-300 p-8 flex flex-col gap-5 shadow shadow-base-300">
        <h1 class="font-bold text-2xl">Day Flow</h1>
        <ul class="steps steps-vertical"
            hx-get="{% url "core:step-list" dayid %}"
            hx-trigger="load, refreshStepList from:body"
            hx-swap="innerHTML"
            hx-target="this">
            <li class="step"><div class="skeleton w-60 h-10"></div></li>
            <li class="step"><div class="skeleton w-80 h-10"></div></li>
            <li class="step"><div class="skeleton w-40 h-10"></div></li>
        </ul>
    </div>
    <dialog id="editdaydialog" class="modal" hx-on:close-dialog="this.close()">
        <div class="modal-box w-fit">
            <div class="flex justify-between items-center">
                <h1 class="font-bold">Edit Day</h1>
                <form method="dialog">
                    <button>
                        <svg xmlns="http://www.w3.org/2000/svg"
                             fill="none"
                             viewBox="0 0 24 24"
                             stroke-width="1.5"
                             stroke="currentColor"
                             class="size-6">
                            <path stroke-linecap="round" stroke-linejoin="round" d="M6 18 18 6M6 6l12 12" />
                        </svg>
                    </button>
                </form>
            </div>
            <div class="mt-4"
                 hx-get="{% url 'core:day-update' dayid %}"
                 hx-trigger="load"
                 hx-swap="innerHTML">
                <span class="loading loading-spinner text-primary"></span> Loading...
            </div>
        </div>
        <form method="dialog" class="modal-backdrop">
            <button>close</button>
        </form>
    </dialog>
</div>
