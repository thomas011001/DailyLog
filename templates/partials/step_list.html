{% for step in steps %}
    <li class="step group {% if step.is_complete %}step-primary{% endif %}"
        id="step-{{ step.id }}">
        <div class="flex items-center justify-between w-full gap-4">
            <div class="flex flex-col items-start gap-1">
                {% if step.type == "break" %}
                    <span class="text-base-content text-md font-bold cursor-pointer hover:text-primary transition-colors"
                          hx-post="{% url 'core:step-toggle' step.id %}"
                          hx-target="closest ul"
                          hx-swap="innerHTML">
                        {{ step.description|upper }}
                    </span>
                {% else %}
                    <div class="flex items-center gap-3">
                        {% for session in step.sessions.all %}
                            <input type="checkbox" 
                                   class="checkbox checkbox-md checkbox-primary cursor-pointer" 
                                   {% if session.is_complete %}checked{% endif %}
                                   hx-post="{% url 'core:session-toggle' session.id %}"
                                   hx-target="closest ul"
                                   hx-swap="innerHTML"
                                   hx-headers='{"X-CSRFToken": "{{ csrf_token }}"}'/>
                        {% endfor %}
                        <button class="btn btn-ghost btn-xs btn-circle opacity-0 group-hover:opacity-100 transition-opacity text-primary"
                                hx-post="{% url 'core:session-create' step.id %}"
                                hx-target="closest ul"
                                hx-swap="innerHTML"
                                hx-headers='{"X-CSRFToken": "{{ csrf_token }}"}'
                                title="Add Session">
                            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="3" stroke="currentColor" class="size-4">
                                <path stroke-linecap="round" stroke-linejoin="round" d="M12 4.5v15m7.5-7.5h-15" />
                            </svg>
                        </button>
                    </div>
                {% endif %}
            </div>

            <div class="flex items-center gap-2 opacity-0 group-hover:opacity-100 transition-opacity ml-auto">
                <button class="btn btn-ghost btn-xs btn-circle text-base-content/50 hover:text-primary"
                        hx-post="{% url 'core:step-toggle' step.id %}"
                        hx-target="closest ul"
                        hx-swap="innerHTML"
                        title="Toggle Step"
                        hx-headers='{"X-CSRFToken": "{{ csrf_token }}"}'>
                    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" class="size-4">
                        <path stroke-linecap="round" stroke-linejoin="round" d="m4.5 12.75 6 6 9-13.5" />
                    </svg>
                </button>
                <button class="btn btn-ghost btn-xs btn-circle text-error/50 hover:text-error"
                        hx-post="{% url 'core:step-delete' step.id %}"
                        hx-target="#step-{{ step.id }}"
                        hx-swap="outerHTML"
                        hx-confirm="Delete this step?"
                        hx-headers='{"X-CSRFToken": "{{ csrf_token }}"}'
                        title="Delete Step">
                    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" class="size-4">
                        <path stroke-linecap="round" stroke-linejoin="round" d="m14.74 9-.34 12m-4.72 0-.34-12M4.5 18.75A2.25 2.25 0 0 0 6.75 21h10.5a2.25 2.25 0 0 0 2.25-2.25V6.75A2.25 2.25 0 0 0 16.5 4.5h-9a2.25 2.25 0 0 0-2.25 2.25V18.75Z" />
                    </svg>
                </button>
            </div>
        </div>
    </li>
{% endfor %}
