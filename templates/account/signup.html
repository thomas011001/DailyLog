{% extends "layout.html" %}
{% block body %}
    <div class="min-h-dvh flex justify-center items-center p-10">
        <div class="flex flex-col items-center gap-5">
            <c-brand />
            <div class="flex flex-col gap-2 items-center">
                <h1 class="font-bold text-base-content text-3xl">Create An Account</h1>
                <p class="text-base-content/50 text-center">Enter your details below to create your account and start logging.</p>
            </div>
            <div class="border-base-300 shadow shadow-base-300 rounded-box max-w-sm border p-6">
                <div id="signup-container">
                    <c-signup-form />
                    <div class="flex justify-center items-center gap-1 mt-3">
                        <p class="text-sm">Alread Have an Account?</p>
                        <a href="{% url "account:login" %}" class="btn btn-link p-0">Login</a>
                    </div>
                </div>
            </div>
        </div>
    </div>
{% endblock body %}
