{% extends "layout.html" %}
{% block body %}
    <div class="min-h-dvh flex justify-center items-center p-10">
        <div class="flex flex-col items-center gap-5">
            <c-brand />
            <div class="flex flex-col gap-2 items-center">
                <h1 class="font-bold text-primary text-3xl">Create An Account</h1>
                <p class="text-muted-foreground text-center">Enter your details below to create your account and start logging.</p>
            </div>
            <div class="border-border rounded max-w-sm border p-6">
                <div id="signup-container">
                    <c-signup-form />
                    <div class="flex justify-center items-center gap-1 mt-3">
                        <p class="text-sm text-muted-foreground">Alread Have an Account?</p>
                        <a href="{% url "account:login" %}"
                           class="text-primary hover:underline p-0">Login</a>
                    </div>
                </div>
            </div>
        </div>
    </div>
{% endblock body %}
